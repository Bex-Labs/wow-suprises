<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Services - WOW Merchant</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/merchant.css">
</head>
<body class="merchant-page" data-page="services">
    
    <aside class="merchant-sidebar">
        <div class="merchant-logo">
            <i class="bi bi-shop"></i>
            <span>WOW Merchant</span>
        </div>
        
        <nav class="merchant-nav">
            <a href="merchant-dashboard.html" class="nav-item">
                <i class="bi bi-grid"></i>
                <span>Dashboard</span>
            </a>
            
            <a href="merchant-orders.html" class="nav-item">
                <i class="bi bi-box-seam"></i>
                <span>Orders</span>
            </a>
            
            <a href="merchant-services.html" class="nav-item active">
                <i class="bi bi-gift"></i>
                <span>My Services</span>
            </a>
            
            <a href="merchant-earnings.html" class="nav-item">
                <i class="bi bi-currency-exchange"></i>
                <span>Earnings</span>
            </a>
             <a href="merchant-reviews.html" class="nav-item">
                <i class="bi bi-star"></i>
                <span>Reviews</span>
            </a>
            
            <a href="merchant-profile.html" class="nav-item">
                <i class="bi bi-person"></i>
                <span>Profile</span>
            </a>
            
            <a href="merchant-settings.html" class="nav-item">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
           
            <div class="nav-divider"></div>
            
            <a href="#" class="nav-item" onclick="merchantLogout(); return false;">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </nav>
    </aside>
    
    <div class="merchant-content">
        <header class="merchant-header">
            <div class="header-left">
                <h1><i class="bi bi-gift"></i> My Services</h1>
                <p>Manage your service offerings</p>
            </div>
            
            <div class="header-right">
                <div class="merchant-user-info">
                    <div class="user-avatar">
                        <i class="bi bi-shop"></i>
                    </div>
                    <div>
                        <div class="user-name" id="merchantDisplayName">Business Name</div>
                        <div class="user-role">Merchant</div>
                    </div>
                </div>
            </div>
        </header>
        
        <main class="merchant-main">
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 24px;">
                <div style="background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 24px;">
                    <div style="font-size: 32px; font-weight: 700; color: #000; margin-bottom: 4px;" id="totalServices">0</div>
                    <div style="font-size: 14px; color: #666; font-weight: 500;">Total Services</div>
                </div>
                <div style="background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 24px;">
                    <div style="font-size: 32px; font-weight: 700; color: #22c55e; margin-bottom: 4px;" id="activeServices">0</div>
                    <div style="font-size: 14px; color: #666; font-weight: 500;">Active Services</div>
                </div>
                <div style="background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 24px;">
                    <div style="font-size: 32px; font-weight: 700; color: #f59e0b; margin-bottom: 4px;" id="avgPrice">₦0</div>
                    <div style="font-size: 14px; color: #666; font-weight: 500;">Average Price</div>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
                <button onclick="openAddServiceModal()" style="padding: 10px 20px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <i class="bi bi-plus-lg"></i> Add New Service
                </button>
            </div>
            
            <div id="servicesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;">
                </div>
            
            <div id="emptyState" style="background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 80px 40px; text-align: center; display: none;">
                <i class="bi bi-gift" style="font-size: 80px; color: #e0e0e0; margin-bottom: 24px; display: block;"></i>
                <h3 style="margin: 0 0 12px 0; font-size: 20px; font-weight: 600; color: #333;">No services yet</h3>
                <p style="margin: 0 0 24px 0; color: #666; font-size: 14px;">Create your first service to start receiving orders</p>
                <button onclick="openAddServiceModal()" style="padding: 12px 32px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">
                    <i class="bi bi-plus-circle"></i> Add Your First Service
                </button>
            </div>
            
        </main>
    </div>
    
    <div id="serviceModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: #fff; border-radius: 16px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
            <div style="padding: 24px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between;">
                <h2 style="margin: 0; font-size: 20px; font-weight: 700;" id="modalTitle">Add Service</h2>
                <button onclick="closeServiceModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">×</button>
            </div>
            
            <form id="serviceForm" style="padding: 24px;">
                <input type="hidden" id="serviceId">
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #000;">Service Name *</label>
                    <input type="text" id="serviceName" required style="width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px;" placeholder="e.g., Birthday Surprise Package">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #000;">Category *</label>
                    <select id="serviceCategory" required style="width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 12 12%27%3E%3Cpath fill=%27%23666%27 d=%27M6 9L1 4h10z%27/%3E%3C/svg%3E') no-repeat right 12px center; appearance: none;">
                        <option value="">Select category</option>
                        <option value="gifts">Gift Packages</option>
                        <option value="flowers">Flowers & Bouquets</option>
                        <option value="cakes">Cakes & Desserts</option>
                        <option value="decorations">Event Decorations</option>
                        <option value="balloons">Balloons & Party Supplies</option>
                        <option value="hampers">Gift Hampers</option>
                        <option value="experiences">Experience Packages</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #000;">Description *</label>
                    <textarea id="serviceDescription" required rows="4" style="width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; resize: vertical; font-family: inherit;" placeholder="Describe your service..."></textarea>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #000;">Base Price (₦) *</label>
                        <input type="number" id="servicePrice" required min="0" step="100" style="width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px;" placeholder="10000">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #000;">Delivery/Prep Time</label>
                        <input type="text" id="serviceDeliveryTime" style="width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px;" placeholder="e.g. 24 hours">
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #000;">Features (Press Enter to add)</label>
                    <div id="featuresList" style="border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px;">
                        </div>
                </div>
                
                <div style="margin-bottom: 24px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="serviceActive" checked style="width: 18px; height: 18px; accent-color: #000;">
                        <span style="font-weight: 600; font-size: 14px; color: #000;">Service is active and available</span>
                    </label>
                </div>
                
                <div style="display: flex; gap: 12px;">
                    <button type="submit" style="flex: 1; padding: 14px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                        <i class="bi bi-check-circle"></i> Save Service
                    </button>
                    <button type="button" onclick="closeServiceModal()" style="padding: 14px 24px; background: #f0f0f0; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="js/utils.js"></script>
    <script src="js/merchant-config.js"></script>
    <script src="js/merchant-auth.js"></script>
    <script src="js/merchant-services.js"></script>
    
</body>
</html>
