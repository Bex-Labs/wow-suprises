<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portal - WOW Surprises</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/merchant.css">
</head>
<body class="merchant-login-page">
    
    <div class="merchant-login-container">
        <!-- Logo & Title -->
        <div class="merchant-login-logo">
            <i class="bi bi-shop" style="font-size: 48px; color: #000;"></i>
            <h1>WOW Merchant</h1>
            <p>Manage your surprise business</p>
        </div>
        
        <!-- Tabs -->
        <div class="merchant-form-tabs">
            <div class="merchant-tab active" onclick="switchMerchantTab('login')">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </div>
            <div class="merchant-tab" onclick="switchMerchantTab('register')">
                <i class="bi bi-person-plus"></i> Register
            </div>
        </div>
        
        <!-- Login Form -->
        <form id="merchantLoginForm" class="merchant-login-form active">
            <!-- Email Field -->
            <div class="form-group">
                <label for="loginEmail" class="form-label">
                    <i class="bi bi-envelope"></i> Business Email
                </label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    class="form-input" 
                    placeholder="merchant@business.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <!-- Password Field -->
            <div class="form-group">
                <label for="loginPassword" class="form-label">
                    <i class="bi bi-lock"></i> Password
                </label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    class="form-input" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
                <label class="form-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">Forgot password?</a>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginText">Sign In</span>
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>
        
        <!-- Register Form -->
        <form id="merchantRegisterForm" class="merchant-register-form">
            <!-- Business Name -->
            <div class="form-group">
                <label for="registerBusinessName" class="form-label">
                    <i class="bi bi-shop"></i> Business Name *
                </label>
                <input 
                    type="text" 
                    id="registerBusinessName" 
                    class="form-input" 
                    placeholder="e.g., Surprise Delights Ltd"
                    required
                >
            </div>
            
            <!-- Owner Name -->
            <div class="form-group">
                <label for="registerOwnerName" class="form-label">
                    <i class="bi bi-person"></i> Owner Full Name *
                </label>
                <input 
                    type="text" 
                    id="registerOwnerName" 
                    class="form-input" 
                    placeholder="Enter your full name"
                    required
                >
            </div>
            
            <!-- Business Email -->
            <div class="form-group">
                <label for="registerEmail" class="form-label">
                    <i class="bi bi-envelope"></i> Business Email *
                </label>
                <input 
                    type="email" 
                    id="registerEmail" 
                    class="form-input" 
                    placeholder="merchant@business.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <!-- Business Phone -->
            <div class="form-group">
                <label for="registerPhone" class="form-label">
                    <i class="bi bi-telephone"></i> Business Phone *
                </label>
                <input 
                    type="tel" 
                    id="registerPhone" 
                    class="form-input" 
                    placeholder="08012345678"
                    required
                >
            </div>
            
            <!-- Business Address -->
            <div class="form-group">
                <label for="registerAddress" class="form-label">
                    <i class="bi bi-geo-alt"></i> Business Address *
                </label>
                <textarea 
                    id="registerAddress" 
                    class="form-input" 
                    placeholder="Enter your business address"
                    rows="2"
                    required
                ></textarea>
            </div>
            
            <!-- Business Category -->
            <div class="form-group">
                <label for="registerCategory" class="form-label">
                    <i class="bi bi-tag"></i> Business Category *
                </label>
                <select id="registerCategory" class="form-input" required>
                    <option value="">Select category</option>
                    <option value="gifts">Gift Packages</option>
                    <option value="flowers">Flowers & Bouquets</option>
                    <option value="cakes">Cakes & Desserts</option>
                    <option value="decorations">Event Decorations</option>
                    <option value="balloons">Balloons & Party Supplies</option>
                    <option value="hampers">Gift Hampers</option>
                    <option value="experiences">Experience Packages</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <!-- Password Field -->
            <div class="form-group">
                <label for="registerPassword" class="form-label">
                    <i class="bi bi-lock"></i> Password *
                </label>
                <input 
                    type="password" 
                    id="registerPassword" 
                    class="form-input" 
                    placeholder="Create a password (min. 6 characters)"
                    required
                    autocomplete="new-password"
                    minlength="6"
                >
            </div>
            
            <!-- Confirm Password Field -->
            <div class="form-group">
                <label for="registerConfirmPassword" class="form-label">
                    <i class="bi bi-lock-fill"></i> Confirm Password *
                </label>
                <input 
                    type="password" 
                    id="registerConfirmPassword" 
                    class="form-input" 
                    placeholder="Confirm your password"
                    required
                    autocomplete="new-password"
                    minlength="6"
                >
            </div>
            
            <!-- Terms Checkbox -->
            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" id="agreeTerms" required>
                    <span>I agree to the <a href="#" class="link">Terms & Conditions</a> and understand my account will be reviewed for approval</span>
                </label>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn-login" id="registerBtn">
                <span id="registerText">Submit Application</span>
                <i class="bi bi-arrow-right"></i>
            </button>
            
            <!-- Info Message -->
            <div class="info-message">
                <i class="bi bi-info-circle"></i>
                <p>Your application will be reviewed by our team. You'll receive an email once approved (usually within 24-48 hours).</p>
            </div>
        </form>
        
        <!-- Footer -->
        <div class="merchant-login-footer">
            <p style="color: #666; font-size: 14px;">
                <i class="bi bi-arrow-left"></i>
                <a href="index.html">Back to Website</a>
            </p>
        </div>
    </div>
    
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <!-- JavaScript Files -->
   <!-- Load Supabase SDK first -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Then your scripts in this order -->
    <script src="js/utils.js"></script>
    <script src="js/merchant-config.js"></script>
    <script src="js/merchant-auth.js"></script> <!-- This creates the instance -->
    <script src="js/merchant-login.js"></script>
</body>
</html>
