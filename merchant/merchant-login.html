<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portal - WOW Surprises</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/merchant.css">
</head>
<body class="merchant-login-page">
    
    <div class="merchant-login-container">
        <div class="merchant-login-logo">
            <i class="bi bi-shop" style="font-size: 48px; color: #000;"></i>
            <h1>WOW Merchant</h1>
            <p>Manage your surprise business</p>
        </div>
        
        <div class="merchant-form-tabs">
            <div class="merchant-tab active" onclick="switchMerchantTab('login')">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </div>
            <div class="merchant-tab" onclick="switchMerchantTab('register')">
                <i class="bi bi-person-plus"></i> Register
            </div>
        </div>
        
        <form id="merchantLoginForm" class="merchant-login-form active">
            <div class="form-group">
                <label for="loginEmail" class="form-label">
                    <i class="bi bi-envelope"></i> Business Email
                </label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    class="form-input" 
                    placeholder="merchant@business.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="loginPassword" class="form-label">
                    <i class="bi bi-lock"></i> Password
                </label>
                <div style="position: relative;">
                    <input 
                        type="password" 
                        id="loginPassword" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                        style="padding-right: 40px;"
                    >
                    <i class="bi bi-eye-slash toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px;" onclick="togglePasswordVisibility('loginPassword', this)"></i>
                </div>
            </div>
            
            <div class="form-options">
                <label class="form-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="merchant-forgot-password.html" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginText">Sign In</span>
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>
        
        <form id="merchantRegisterForm" class="merchant-register-form">
            <div class="form-group">
                <label for="registerBusinessName" class="form-label">
                    <i class="bi bi-shop"></i> Business Name *
                </label>
                <input 
                    type="text" 
                    id="registerBusinessName" 
                    class="form-input" 
                    placeholder="e.g., Surprise Delights Ltd"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="registerOwnerName" class="form-label">
                    <i class="bi bi-person"></i> Owner Full Name *
                </label>
                <input 
                    type="text" 
                    id="registerOwnerName" 
                    class="form-input" 
                    placeholder="Enter your full name"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="registerEmail" class="form-label">
                    <i class="bi bi-envelope"></i> Business Email *
                </label>
                <input 
                    type="email" 
                    id="registerEmail" 
                    class="form-input" 
                    placeholder="merchant@business.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="registerPhone" class="form-label">
                    <i class="bi bi-telephone"></i> Business Phone *
                </label>
                <input 
                    type="tel" 
                    id="registerPhone" 
                    class="form-input" 
                    placeholder="08012345678"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="registerAddress" class="form-label">
                    <i class="bi bi-geo-alt"></i> Business Address *
                </label>
                <textarea 
                    id="registerAddress" 
                    class="form-input" 
                    placeholder="Enter your business address"
                    rows="2"
                    required
                ></textarea>
            </div>
            
            <div class="form-group">
                <label for="registerCategory" class="form-label">
                    <i class="bi bi-tag"></i> Business Category *
                </label>
                <select id="registerCategory" class="form-input" required>
                    <option value="">Select category</option>
                    <option value="gifts">Gift Packages</option>
                    <option value="flowers">Flowers & Bouquets</option>
                    <option value="cakes">Cakes & Desserts</option>
                    <option value="decorations">Event Decorations</option>
                    <option value="balloons">Balloons & Party Supplies</option>
                    <option value="hampers">Gift Hampers</option>
                    <option value="experiences">Experience Packages</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="registerPassword" class="form-label">
                    <i class="bi bi-lock"></i> Password *
                </label>
                <div style="position: relative;">
                    <input 
                        type="password" 
                        id="registerPassword" 
                        class="form-input" 
                        placeholder="Create a password (min. 6 characters)"
                        required
                        autocomplete="new-password"
                        minlength="6"
                        style="padding-right: 40px;"
                    >
                    <i class="bi bi-eye-slash toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px;" onclick="togglePasswordVisibility('registerPassword', this)"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label for="registerConfirmPassword" class="form-label">
                    <i class="bi bi-lock-fill"></i> Confirm Password *
                </label>
                <div style="position: relative;">
                    <input 
                        type="password" 
                        id="registerConfirmPassword" 
                        class="form-input" 
                        placeholder="Confirm your password"
                        required
                        autocomplete="new-password"
                        minlength="6"
                        style="padding-right: 40px;"
                    >
                    <i class="bi bi-eye-slash toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px;" onclick="togglePasswordVisibility('registerConfirmPassword', this)"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" id="agreeTerms" required>
                    <span>I agree to the <a href="#" class="link">Terms & Conditions</a> and understand my account will be reviewed for approval</span>
                </label>
            </div>
            
            <button type="submit" class="btn-login" id="registerBtn">
                <span id="registerText">Submit Application</span>
                <i class="bi bi-arrow-right"></i>
            </button>
            
            <div class="info-message">
                <i class="bi bi-info-circle"></i>
                <p>Your application will be reviewed by our team. You'll receive an email once approved (usually within 24-48 hours).</p>
            </div>
        </form>
        
        <div class="merchant-login-footer">
            <p style="color: #666; font-size: 14px;">
                <i class="bi bi-arrow-left"></i>
                <a href="index.html">Back to Website</a>
            </p>
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/utils.js"></script>
    <script src="js/merchant-config.js"></script>
    <script src="js/merchant-auth.js"></script> <script src="js/merchant-login.js"></script>
</body>
</html>
