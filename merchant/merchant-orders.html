<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - WOW Merchant</title>
    
    <script src="js/merchant-auth-guard.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/merchant.css">
    
    <style>
        /* Mobile Sidebar Toggle styling */
        #sidebarToggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: #333; margin-right: 15px; }
        @media (max-width: 768px) {
            #sidebarToggle { display: block; }
            .merchant-sidebar { transform: translateX(-100%); transition: transform 0.3s; z-index: 1001;}
            .merchant-sidebar.active { transform: translateX(0); }
            
            /* Responsive Filters */
            .filters-bar { flex-direction: column; align-items: stretch; }
            .search-group { width: 100%; }
            .filter-group { overflow-x: auto; padding-bottom: 5px; }
        }

        /* Filter Bar Styles */
        .filters-bar { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 24px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; }
        .search-group { flex: 1; position: relative; }
        .search-group i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999; }
        
        /* Search Width: 90% */
        .search-input { width: 90%; padding: 10px 10px 10px 36px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .search-input:focus { border-color: #000; }
        
        .filter-group { display: flex; gap: 10px; }
        .filter-select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; cursor: pointer; outline: none; }
        .btn-export { padding: 10px 16px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .btn-export:hover { background: #333; }

        /* Order List Container */
        .orders-container { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; }
        .orders-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .count-badge { background: #f0f0f0; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; color: #666; }
    </style>
</head>
<body class="merchant-page" data-page="orders">
    
    <aside class="merchant-sidebar" id="merchantSidebar">
        <div class="merchant-logo">
            <i class="bi bi-shop"></i>
            <span>WOW Merchant</span>
        </div>
        
        <nav class="merchant-nav">
            <a href="merchant-dashboard.html" class="nav-item">
                <i class="bi bi-grid"></i>
                <span>Dashboard</span>
            </a>
            
            <a href="merchant-orders.html" class="nav-item active">
                <i class="bi bi-box-seam"></i>
                <span>Orders</span>
                <span class="badge" id="pendingOrdersBadge">0</span>
            </a>
            
            <a href="merchant-services.html" class="nav-item">
                <i class="bi bi-gift"></i>
                <span>My Services</span>
            </a>
            
            <a href="merchant-earnings.html" class="nav-item">
                <i class="bi bi-currency-exchange"></i>
                <span>Earnings</span>
            </a>
            
            <a href="merchant-reviews.html" class="nav-item">
                <i class="bi bi-star"></i>
                <span>Reviews</span>
            </a>
            
            <a href="merchant-profile.html" class="nav-item">
                <i class="bi bi-person"></i>
                <span>Profile</span>
            </a>
            
            <a href="merchant-settings.html" class="nav-item">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
            
            <div class="nav-divider"></div>
            
            <a href="#" class="nav-item" onclick="merchantLogout(); return false;">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </nav>
    </aside>

    <div class="merchant-content">
        <header class="merchant-header">
            <div class="header-left">
                <div style="display: flex; align-items: center;">
                    <button id="sidebarToggle"><i class="bi bi-list"></i></button>
                    <div>
                        <h1><i class="bi bi-box-seam"></i> Orders</h1>
                        <p>Manage and track your customer orders</p>
                    </div>
                </div>
            </div>
            
            <div class="header-right">
                <div class="merchant-user-info">
                    <div class="user-avatar" id="headerAvatar">
                        <i class="bi bi-shop"></i>
                    </div>
                    <div>
                        <div class="user-name" id="merchantDisplayName">Loading...</div>
                        <div class="user-role">Merchant</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="merchant-main">
            
            <div class="filters-bar">
                <div class="search-group">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchOrders" class="search-input" placeholder="Search order ID, customer name...">
                </div>
                
                <div class="filter-group">
                    <select id="statusFilter" class="filter-select">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    
                    <select id="dateFilter" class="filter-select">
                        <option value="all">All Time</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                    </select>
                    
                    <button id="exportOrdersBtn" class="btn-export">
                        <i class="bi bi-download"></i> <span style="display: none;">Export</span>
                    </button>
                </div>
            </div>

            <div class="orders-container">
                <div class="orders-header">
                    <h3 style="margin: 0; font-size: 16px; font-weight: 600;">Order List</h3>
                    <span id="ordersCount" class="count-badge">0</span>
                </div>
                
                <div id="ordersLoading" style="text-align: center; padding: 40px;">
                    <div style="width: 40px; height: 40px; border: 3px solid #f0f0f0; border-top-color: #000; border-radius: 50%; margin: 0 auto 15px; animation: spin 1s linear infinite;"></div>
                    <p style="color: #666; font-size: 14px;">Loading orders...</p>
                </div>

                <div id="ordersList">
                    </div>

                <div id="ordersEmpty" style="display: none; text-align: center; padding: 60px 20px;">
                    <i class="bi bi-inbox" style="font-size: 48px; color: #ddd; margin-bottom: 15px; display: block;"></i>
                    <h4 style="margin: 0 0 8px 0;">No orders found</h4>
                    <p style="margin: 0; color: #666; font-size: 14px;">Try adjusting your filters or wait for new bookings.</p>
                </div>
            </div>

        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/merchant-config.js"></script>
    <script src="js/merchant-auth.js"></script>
    <script src="js/merchant-orders.js"></script>
    
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
