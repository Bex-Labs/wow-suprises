<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - WOW Merchant</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/merchant.css">
    
    <style>
        /* Mobile Sidebar Toggle */
        #sidebarToggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: #333; margin-right: 15px; }
        @media (max-width: 768px) {
            #sidebarToggle { display: block; }
            .merchant-sidebar { transform: translateX(-100%); transition: transform 0.3s; z-index: 1001;}
            .merchant-sidebar.active { transform: translateX(0); }
            .reviews-layout { grid-template-columns: 1fr !important; }
        }

        /* Review Page Specifics */
        .reviews-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
        
        /* Rating Summary Card */
        .rating-summary { background: #fff; padding: 24px; border-radius: 12px; border: 1px solid #e0e0e0; }
        .big-rating { font-size: 48px; font-weight: 700; color: #000; line-height: 1; }
        .star-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; color: #666; }
        .progress-bar { flex: 1; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #f59e0b; border-radius: 3px; width: 0%; transition: width 0.5s; }
        
        /* Review Card */
        .review-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .reviewer-info { display: flex; gap: 12px; align-items: center; }
        .reviewer-avatar { width: 40px; height: 40px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #666; }
        .review-meta h4 { margin: 0; font-size: 15px; }
        .review-meta span { font-size: 12px; color: #999; }
        .stars { color: #f59e0b; letter-spacing: 2px; font-size: 14px; }
        
        /* Reply Section */
        .merchant-reply { margin-top: 15px; padding: 15px; background: #f9fafb; border-radius: 8px; border-left: 3px solid #000; }
        .reply-header { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .reply-input-area { margin-top: 15px; display: none; }
        .reply-input-area.active { display: block; }
        .reply-textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-family: inherit; font-size: 14px; resize: vertical; }
        
        /* Filters */
        .filter-bar { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .filter-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 14px; }
    </style>
</head>
<body class="merchant-page" data-page="reviews">
    
    <aside class="merchant-sidebar" id="merchantSidebar">
        <div class="merchant-logo"><i class="bi bi-shop"></i> <span>WOW Merchant</span></div>
        <nav class="merchant-nav">
            <a href="merchant-dashboard.html" class="nav-item"><i class="bi bi-grid"></i> <span>Dashboard</span></a>
            <a href="merchant-orders.html" class="nav-item"><i class="bi bi-box-seam"></i> <span>Orders</span></a>
            <a href="merchant-bookings.html" class="nav-item"><i class="bi bi-clipboard-check"></i> <span>Booking Mgmt</span></a>
            <a href="merchant-services.html" class="nav-item"><i class="bi bi-gift"></i> <span>My Services</span></a>
            <a href="merchant-earnings.html" class="nav-item"><i class="bi bi-currency-exchange"></i> <span>Earnings</span></a>
            <a href="merchant-reviews.html" class="nav-item active"><i class="bi bi-star"></i> <span>Reviews</span></a>
            <a href="merchant-profile.html" class="nav-item"><i class="bi bi-person"></i> <span>Profile</span></a>
            <a href="merchant-settings.html" class="nav-item"><i class="bi bi-gear"></i> <span>Settings</span></a>
            <div class="nav-divider"></div>
            <a href="#" class="nav-item" onclick="merchantLogout()"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></a>
        </nav>
    </aside>

    <div class="merchant-content">
        <header class="merchant-header">
            <div class="header-left">
                <div style="display: flex; align-items: center;">
                    <button id="sidebarToggle"><i class="bi bi-list"></i></button>
                    <div>
                        <h1>Customer Reviews</h1>
                        <p>Manage feedback and reply to customers</p>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="merchant-user-info">
                    <div class="user-avatar" id="headerAvatar"><i class="bi bi-shop"></i></div>
                    <div>
                        <div class="user-name" id="merchantName">Loading...</div>
                        <div class="user-role">Merchant</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="merchant-main">
            <div class="reviews-layout">
                <div class="rating-summary">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <div class="big-rating" id="avgRatingDisplay">0.0</div>
                        <div class="stars" id="avgStarsDisplay">☆☆☆☆☆</div>
                        <div style="color: #666; font-size: 14px; margin-top: 5px;">Based on <span id="totalCountDisplay">0</span> reviews</div>
                    </div>
                    
                    <div id="ratingBars">
                        <div class="star-row"><span>5 ★</span><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><span>0</span></div>
                        <div class="star-row"><span>4 ★</span><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><span>0</span></div>
                        <div class="star-row"><span>3 ★</span><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><span>0</span></div>
                        <div class="star-row"><span>2 ★</span><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><span>0</span></div>
                        <div class="star-row"><span>1 ★</span><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><span>0</span></div>
                    </div>
                </div>

                <div>
                    <div class="filter-bar">
                        <h3 style="margin: 0; font-size: 18px;">All Reviews</h3>
                        <div style="display: flex; gap: 10px;">
                            <select class="filter-select" id="ratingFilter" onchange="filterReviews()">
                                <option value="all">All Ratings</option>
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="2">2 Stars</option>
                                <option value="1">1 Star</option>
                            </select>
                            <select class="filter-select" id="sortFilter" onchange="filterReviews()">
                                <option value="newest">Newest First</option>
                                <option value="oldest">Oldest First</option>
                                <option value="highest">Highest Rated</option>
                                <option value="lowest">Lowest Rated</option>
                            </select>
                        </div>
                    </div>

                    <div id="reviewsContainer">
                        <div style="text-align: center; padding: 40px; color: #666;">
                            <i class="bi bi-hourglass-split" style="font-size: 30px;"></i>
                            <p>Loading reviews...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/merchant-config.js"></script>
    <script src="js/merchant-auth.js"></script>
    <script src="js/merchant-reviews.js"></script>
</body>
</html>
