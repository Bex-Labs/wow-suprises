<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Management - WOW Merchant</title>
    
    <script src="js/merchant-auth-guard.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/merchant.css">
    
    <style>
        /* Specific Styles for the Job Ticket (Not in general CSS) */
        .ticket-modal { background: #fff; width: 95%; max-width: 700px; margin: 5% auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .ticket-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; }
        .ticket-body { padding: 25px; max-height: 80vh; overflow-y: auto; }
        
        .progress-track { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .progress-track::before { content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 3px; background: #e5e7eb; z-index: 0; }
        .track-step { position: relative; z-index: 1; text-align: center; background: #fff; padding: 0 10px; }
        .track-icon { width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; font-weight: bold; color: #9ca3af; }
        .track-step.active .track-icon { background: #22c55e; color: #fff; }
        .track-label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; }
        .track-step.active .track-label { color: #22c55e; }

        /* Action Grid */
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body class="merchant-page" data-page="bookings">
    
    <aside class="merchant-sidebar" id="adminSidebar">
        <div class="merchant-logo">
            <i class="bi bi-shop"></i>
            <span>WOW Merchant</span>
        </div>
        
        <nav class="merchant-nav">
            <a href="merchant-dashboard.html" class="nav-item">
                <i class="bi bi-grid"></i> <span>Dashboard</span>
            </a>
            
            <a href="merchant-orders.html" class="nav-item">
                <i class="bi bi-box-seam"></i> <span>Orders</span>
            </a>

            <a href="merchant-bookings.html" class="nav-item active">
                <i class="bi bi-clipboard-check"></i> <span>Booking Mgmt</span>
                <span class="badge" id="actionNeededBadge" style="display:none;">0</span>
            </a>
            
            <a href="merchant-services.html" class="nav-item">
                <i class="bi bi-gift"></i> <span>My Services</span>
            </a>
            <a href="merchant-earnings.html" class="nav-item">
                <i class="bi bi-currency-exchange"></i> <span>Earnings</span>
            </a>
            <a href="merchant-reviews.html" class="nav-item">
                <i class="bi bi-star"></i> <span>Reviews</span>
            </a>
            <a href="merchant-profile.html" class="nav-item">
                <i class="bi bi-person"></i> <span>Profile</span>
            </a>
            <a href="merchant-settings.html" class="nav-item">
                <i class="bi bi-gear"></i> <span>Settings</span>
            </a>
            <div class="nav-divider"></div>
            <a href="#" class="nav-item" onclick="merchantLogout(); return false;">
                <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
            </a>
        </nav>
    </aside>
    
    <div class="merchant-content">
        <header class="merchant-header">
            <div class="header-left">
                <h1><i class="bi bi-clipboard-check"></i> Booking Management</h1>
                <p>Process your active orders</p>
            </div>
            
            <div class="header-right">
                <div class="merchant-user-info"> <div class="user-avatar">
                        <i class="bi bi-shop"></i>
                    </div>
                    <div>
                        <div class="user-name" id="merchantDisplayName">Merchant</div>
                        <div class="user-role">Partner</div>
                    </div>
                </div>
                <button id="sidebarToggle" style="margin-left:15px; background:none; border:none; font-size:24px; display:none;"><i class="bi bi-list"></i></button>
            </div>
        </header>
        
        <main class="merchant-main">
            
            <div class="stat-card" style="margin-bottom: 24px; padding: 15px;">
                <div style="display: flex; gap: 10px; overflow-x: auto; align-items: center;">
                    <div style="flex: 1; position: relative;">
                        <i class="bi bi-search" style="position: absolute; left: 12px; top: 10px; color: #999;"></i>
                        <input type="text" id="searchInput" placeholder="Search orders..." onkeyup="searchBookings()" style="width: 90%; padding: 8px 8px 8px 35px; border: 1px solid #ddd; border-radius: 6px;">
                    </div>
                    
                    <select id="statusFilter" onchange="filterBookings()" style="padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="">All Active</option>
                        <option value="pending">New Request</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="processing">Processing</option>
                        <option value="out_for_delivery">Delivery</option>
                    </select>
                    
                    <button onclick="loadBookings()" style="padding: 8px 15px; background: #000; color: white; border: none; border-radius: 6px; cursor: pointer;">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
            </div>

            <div class="stat-card" style="padding: 0; overflow: hidden;">
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead style="background: #f9fafb; border-bottom: 1px solid #eee;">
                            <tr>
                                <th style="padding: 15px; text-align: left; font-size: 12px; font-weight: 600; color: #666;">REF #</th>
                                <th style="padding: 15px; text-align: left; font-size: 12px; font-weight: 600; color: #666;">PACKAGE</th>
                                <th style="padding: 15px; text-align: left; font-size: 12px; font-weight: 600; color: #666;">DUE DATE</th>
                                <th style="padding: 15px; text-align: left; font-size: 12px; font-weight: 600; color: #666;">STATUS</th>
                                <th style="padding: 15px; text-align: left; font-size: 12px; font-weight: 600; color: #666;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody">
                            <tr><td colspan="5" style="text-align: center; padding: 40px; color: #666;">Loading active bookings...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </main>
    </div>

    <div id="jobModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
        <div class="ticket-modal">
            <div class="ticket-header">
                <div>
                    <h3 style="margin: 0; font-size: 18px;" id="modalRef">#ORD-000</h3>
                    <small style="color: #666;" id="modalDate">Due: Jan 1, 2026</small>
                </div>
                <button onclick="closeJobModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            
            <div class="ticket-body">
                <div class="progress-track" id="statusTracker"></div>

                <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
                    <h4 style="margin: 0 0 15px 0; font-size: 13px; text-transform: uppercase; color: #666; border-bottom: 1px solid #ddd; padding-bottom: 8px;">Requirements</h4>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label style="font-size: 11px; font-weight: 700; color: #666; display: block; margin-bottom: 4px;">PACKAGE</label>
                            <div id="modalPackage" style="font-weight: 500;">-</div>
                        </div>
                        <div>
                            <label style="font-size: 11px; font-weight: 700; color: #666; display: block; margin-bottom: 4px;">RECIPIENT</label>
                            <div id="modalRecipient" style="font-weight: 500;">-</div>
                        </div>
                        <div>
                            <label style="font-size: 11px; font-weight: 700; color: #666; display: block; margin-bottom: 4px;">ADDRESS</label>
                            <div id="modalAddress" style="font-weight: 500;">-</div>
                        </div>
                        <div>
                            <label style="font-size: 11px; font-weight: 700; color: #666; display: block; margin-bottom: 4px;">PHONE</label>
                            <div id="modalPhone" style="font-weight: 500;">-</div>
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
                        <label style="font-size: 11px; font-weight: 700; color: #666; display: block; margin-bottom: 4px;">INSTRUCTIONS</label>
                        <div id="modalInstructions" style="background: #fff; padding: 10px; border: 1px solid #eee; border-radius: 6px; font-style: italic; color: #333;">
                            None.
                        </div>
                    </div>
                </div>

                <div class="action-buttons" id="actionButtons">
                    </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/merchant-config.js"></script>
    <script src="js/merchant-auth.js"></script>
    <script src="js/merchant-bookings.js"></script>
    
    <script>
        // Simple Sidebar Toggle for Mobile
        const toggleBtn = document.getElementById('sidebarToggle');
        if(toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.getElementById('adminSidebar').classList.toggle('open'); // Using 'open' class from your CSS
            });
        }
    </script>
</body>
</html>
