<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - WOW Surprises</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- CSS Files (Separate) -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">
    
    <div class="admin-login-container">
        <!-- Logo & Title -->
        <div class="admin-login-logo">
            <i class="bi bi-shield-check" style="font-size: 48px; color: #000;"></i>
            <h1>WOW Admin</h1>
            <p>Manage your surprise business</p>
        </div>
        
        <!-- Tabs -->
        <div class="admin-form-tabs">
            <div class="admin-tab active" onclick="switchAdminTab('login')">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </div>
            <div class="admin-tab" onclick="switchAdminTab('register')">
                <i class="bi bi-person-plus"></i> Register
            </div>
        </div>
        
        <!-- Login Form -->
        <form id="adminLoginForm" class="admin-login-form active">
            <!-- Email Field -->
            <div class="form-group">
                <label for="loginEmail" class="form-label">
                    <i class="bi bi-envelope"></i> Email Address
                </label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    class="form-input" 
                    placeholder="admin@wowsurprises.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <!-- Password Field -->
            <div class="form-group">
                <label for="loginPassword" class="form-label">
                    <i class="bi bi-lock"></i> Password
                </label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    class="form-input" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
                <label class="form-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">Forgot password?</a>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginText">Sign In</span>
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>
        
        <!-- Register Form -->
        <form id="adminRegisterForm" class="admin-register-form">
            <!-- Full Name Field -->
            <div class="form-group">
                <label for="registerName" class="form-label">
                    <i class="bi bi-person"></i> Full Name
                </label>
                <input 
                    type="text" 
                    id="registerName" 
                    class="form-input" 
                    placeholder="Enter your full name"
                    required
                >
            </div>
            
            <!-- Email Field -->
            <div class="form-group">
                <label for="registerEmail" class="form-label">
                    <i class="bi bi-envelope"></i> Email Address
                </label>
                <input 
                    type="email" 
                    id="registerEmail" 
                    class="form-input" 
                    placeholder="admin@wowsurprises.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <!-- Phone Field -->
            <div class="form-group">
                <label for="registerPhone" class="form-label">
                    <i class="bi bi-telephone"></i> Phone Number
                </label>
                <input 
                    type="tel" 
                    id="registerPhone" 
                    class="form-input" 
                    placeholder="Enter your phone number"
                    required
                >
            </div>
            
            <!-- Password Field -->
            <div class="form-group">
                <label for="registerPassword" class="form-label">
                    <i class="bi bi-lock"></i> Password
                </label>
                <input 
                    type="password" 
                    id="registerPassword" 
                    class="form-input" 
                    placeholder="Create a password (min. 6 characters)"
                    required
                    autocomplete="new-password"
                >
            </div>
            
            <!-- Confirm Password Field -->
            <div class="form-group">
                <label for="registerConfirmPassword" class="form-label">
                    <i class="bi bi-lock-fill"></i> Confirm Password
                </label>
                <input 
                    type="password" 
                    id="registerConfirmPassword" 
                    class="form-input" 
                    placeholder="Confirm your password"
                    required
                    autocomplete="new-password"
                >
            </div>
            
            <!-- Terms Checkbox -->
            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" id="agreeTerms" required>
                    <span>I agree to the <a href="#" class="link">Terms & Conditions</a></span>
                </label>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn-login" id="registerBtn">
                <span id="registerText">Create Admin Account</span>
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>
        
        <!-- Footer -->
        <div class="admin-login-footer">
            <p style="color: #666; font-size: 14px;">
                <i class="bi bi-arrow-left"></i>
                <a href="admin-login.html">Back to Website</a>
            </p>
        </div>
    </div>
    
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <!-- JavaScript Files (Separate & In Order) -->
    <script src="js/utils.js"></script>
    <script src="js/admin-config.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-login.js"></script>
    
</body>
</html>
