<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Forgot Password - WOW Surprises</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">
    
    <div class="admin-login-container">
        <div class="admin-login-logo">
            <i class="bi bi-shield-lock" style="font-size: 48px; color: #000;"></i>
            <h1>Reset Password</h1>
            <p>Enter your admin email to receive a reset link.</p>
        </div>
        
        <form id="adminForgotForm" class="admin-login-form active" style="margin-top: 20px;">
            <div class="form-group">
                <label for="resetEmail" class="form-label">
                    <i class="bi bi-envelope"></i> Email Address
                </label>
                <input 
                    type="email" 
                    id="resetEmail" 
                    class="form-input" 
                    placeholder="admin@wowsurprises.com"
                    required
                >
            </div>
            
            <button type="submit" class="btn-login" id="resetBtn">
                <span id="resetText">Send Reset Link</span>
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>
        
        <div class="admin-login-footer" style="margin-top: 30px;">
            <p style="color: #666; font-size: 14px;">
                <i class="bi bi-arrow-left"></i>
                <a href="admin-login.html">Back to Login</a>
            </p>
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="js/utils.js"></script>
    <script src="js/admin-config.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-forgot-password.js"></script>
</body>
</html>
