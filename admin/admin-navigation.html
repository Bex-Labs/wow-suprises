<!-- ============================================================
     WOW Surprises – Admin Navigation Component
     Include in all admin pages via:
     <div id="adminNav"></div>
     <script>fetch('admin-navigation.html').then(r=>r.text()).then(h=>{document.getElementById('adminNav').innerHTML=h})</script>
     OR just paste the <aside> block directly.
     ============================================================ -->

<aside class="admin-sidebar" id="adminSidebar">

  <!-- Logo -->
  <div class="admin-logo">
    <img src="../images/wowlogo-nobg.png" alt="WOW Surprises"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
    <div class="admin-logo-fallback" style="display:none;">
      WOW<span>!</span>
    </div>
    <span class="admin-logo-badge">Admin</span>
  </div>

  <!-- Navigation -->
  <nav class="admin-nav">

    <a href="admin-dashboard.html" class="nav-item" data-page="dashboard">
      <span class="material-symbols-outlined">dashboard</span>
      <span>Dashboard</span>
    </a>

    <a href="admin-bookings.html" class="nav-item" data-page="bookings">
      <span class="material-symbols-outlined">calendar_month</span>
      <span>Bookings</span>
      <span class="badge" id="pendingBookingsBadge" style="display:none;">0</span>
    </a>

    <a href="admin-orders.html" class="nav-item" data-page="orders">
      <span class="material-symbols-outlined">inventory_2</span>
      <span>Orders</span>
    </a>

    <a href="admin-packages.html" class="nav-item" data-page="packages">
      <span class="material-symbols-outlined">card_giftcard</span>
      <span>Packages</span>
    </a>

    <a href="admin-users.html" class="nav-item" data-page="users">
      <span class="material-symbols-outlined">group</span>
      <span>Users</span>
    </a>

    <a href="admin-merchants.html" class="nav-item" data-page="merchants">
      <span class="material-symbols-outlined">storefront</span>
      <span>Merchants</span>
    </a>

    <a href="admin-analytics.html" class="nav-item" data-page="analytics">
      <span class="material-symbols-outlined">insights</span>
      <span>Analytics</span>
    </a>

    <a href="admin-payouts.html" class="nav-item" data-page="payouts">
      <span class="material-symbols-outlined">payments</span>
      <span>Payouts</span>
    </a>

    <a href="admin-settings.html" class="nav-item" data-page="settings">
      <span class="material-symbols-outlined">settings</span>
      <span>Settings</span>
    </a>

    <div class="nav-divider"></div>

    <a href="../index.html" class="nav-item nav-client-view" target="_blank" title="Open customer site">
      <span class="material-symbols-outlined">open_in_new</span>
      <span>View Live Site</span>
    </a>

    <a href="#" class="nav-item" onclick="adminLogout(); return false;">
      <span class="material-symbols-outlined">logout</span>
      <span>Logout</span>
    </a>

  </nav>
</aside>

<script>
// ── Set active nav item based on data-page attribute on <body> ────────────────
document.addEventListener('DOMContentLoaded', () => {
  const currentPage = document.body.getAttribute('data-page');
  if (currentPage) {
    const activeItem = document.querySelector(`.admin-nav .nav-item[data-page="${currentPage}"]`);
    if (activeItem) activeItem.classList.add('active');
  }

  // Load pending bookings count into badge
  loadPendingBadge();
});

async function loadPendingBadge() {
  try {
    const client = window.sbClient || (window.API && window.API.init());
    if (!client) return;
    const { data } = await client
      .from('bookings')
      .select('id', { count: 'exact', head: true })
      .eq('status', 'pending');
    const count = data?.length || 0;
    const badge = document.getElementById('pendingBookingsBadge');
    if (badge && count > 0) {
      badge.textContent = count > 99 ? '99+' : count;
      badge.style.display = 'inline-flex';
    }
  } catch(e) { /* silent */ }
}

// ── Admin logout ─────────────────────────────────────────────────────────────
async function adminLogout() {
  if (!confirm('Are you sure you want to logout?')) return;
  try {
    const client = window.sbClient;
    if (client) await client.auth.signOut();
    localStorage.removeItem('currentUser');
    sessionStorage.clear();
    window.location.href = '../login.html';   // → unified login page
  } catch (e) {
    console.error('Logout error:', e);
    window.location.href = '../login.html';
  }
}

// ── Mobile sidebar toggle (called from each page's hamburger button) ─────────
function toggleSidebar() {
  document.getElementById('adminSidebar')?.classList.toggle('active');
}

// Expose globally
window.adminLogout   = adminLogout;
window.toggleSidebar = toggleSidebar;
</script>
