<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - WOW Admin</title>
    
    <script src="js/admin-auth-guard.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/admin-additional.css">
    
    <style>
        /* Specific Styles from Dashboard */
        html, body { overflow-x: hidden; max-width: 100%; }
        .admin-content, .admin-main { overflow-x: hidden; max-width: 100%; }
        .admin-card { max-width: 100%; overflow: hidden; }
        .admin-card-body { overflow-x: auto; max-width: 100%; }
        
        /* Order Status Badges */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #cce5ff; color: #004085; }
        .status-in-progress { background: #e2e3e5; color: #383d41; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        /* Mobile Toggle */
        #sidebarToggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: #333; margin-right: 15px; }
        @media (max-width: 768px) {
            #sidebarToggle { display: block; }
            .admin-sidebar { transform: translateX(-100%); transition: transform 0.3s; z-index: 1001;}
            .admin-sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body class="admin-page" data-page="orders">
    
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-logo">
            <i class="bi bi-shield-check"></i>
            <span>WOW Admin</span>
        </div>
        
        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="nav-item">
                <i class="bi bi-grid"></i> <span>Dashboard</span>
            </a>
            
            <a href="admin-orders.html" class="nav-item active">
                <i class="bi bi-box-seam"></i> <span>Orders</span>
            </a>

            <a href="admin-merchants.html" class="nav-item">
                <i class="bi bi-shop"></i> <span>Merchants</span>
            </a>

            <a href="admin-payouts.html" class="nav-item">
                <i class="bi bi-wallet2"></i> <span>Payouts</span>
            </a>
            
            <a href="admin-bookings.html" class="nav-item">
                <i class="bi bi-calendar-check"></i> <span>Bookings</span>
                <span class="badge" id="pendingBookingsBadge">0</span>
            </a>
            
            <a href="admin-packages.html" class="nav-item">
                <i class="bi bi-gift"></i> <span>Packages</span>
            </a>
            
            <a href="admin-users.html" class="nav-item">
                <i class="bi bi-people"></i> <span>Users</span>
            </a>
            
            <a href="admin-analytics.html" class="nav-item">
                <i class="bi bi-graph-up"></i> <span>Analytics</span>
            </a>
            
            <a href="admin-settings.html" class="nav-item">
                <i class="bi bi-gear"></i> <span>Settings</span>
            </a>
            
            <div class="nav-divider"></div>
            
            <a href="../index.html" class="nav-item nav-client-view" target="_blank">
                <i class="bi bi-eye"></i> <span>View as Client</span>
                <i class="bi bi-box-arrow-up-right" style="margin-left: auto; font-size: 12px;"></i>
            </a>
            
            <a href="#" class="nav-item" onclick="adminLogout(); return false;">
                <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
            </a>
        </nav>
    </aside>

    <div class="admin-content">
        <header class="admin-header">
            <div class="header-left">
                <div style="display: flex; align-items: center;">
                    <button id="sidebarToggle"><i class="bi bi-list"></i></button>
                    <div>
                        <h1><i class="bi bi-box-seam"></i> Platform Orders</h1>
                        <p>Real-time tracking of all client orders</p>
                    </div>
                </div>
            </div>
            
            <div class="header-right">
                <div class="admin-user-info">
                    <div class="user-avatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="adminDisplayName">Admin User</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="admin-main">
            <div class="admin-card" style="margin-bottom: 24px;">
                <div class="admin-card-body" style="padding: 16px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
                    <div style="flex: 1; min-width: 250px;">
                        <input type="text" id="searchOrder" placeholder="Search Order ID, Client, or Merchant..." style="width: 90%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                    <select id="statusFilter" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; min-width: 150px;">
                        <option value="all">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <button onclick="loadAllOrders()" class="admin-btn admin-btn-secondary">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                </div>
            </div>

            <div class="admin-card">
                <div class="admin-card-body" style="padding: 0;">
                    <table class="admin-table" style="width: 100%; border-collapse: collapse;">
                        <thead style="background: #f8f9fa;">
                            <tr style="text-align: left; border-bottom: 2px solid #eee;">
                                <th style="padding: 15px;">Order ID / Date</th>
                                <th style="padding: 15px;">Merchant</th>
                                <th style="padding: 15px;">Client</th>
                                <th style="padding: 15px;">Amount</th>
                                <th style="padding: 15px;">Status</th>
                                <th style="padding: 15px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr><td colspan="6" style="text-align: center; padding: 40px;">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/admin-config.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-orders.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', function() {
            document.getElementById('adminSidebar').classList.toggle('active');
        });
    </script>
</body>
</html>
