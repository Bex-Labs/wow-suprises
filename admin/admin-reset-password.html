<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - WOW Surprises</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">
    
    <div class="admin-login-container">
        <div class="admin-login-logo">
            <i class="bi bi-key" style="font-size: 48px; color: #000;"></i>
            <h1>Create New Password</h1>
            <p>Please enter your new secure password below.</p>
        </div>
        
        <form id="adminUpdatePasswordForm" class="admin-login-form active" style="margin-top: 20px;">
            
            <div class="form-group">
                <label for="newPassword" class="form-label">
                    <i class="bi bi-lock"></i> New Password
                </label>
                <div style="position: relative;">
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="form-input" 
                        placeholder="At least 6 characters"
                        required
                        minlength="6"
                        style="padding-right: 40px;"
                    >
                    <i class="bi bi-eye-slash toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px;" onclick="togglePasswordVisibility('newPassword', this)"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmNewPassword" class="form-label">
                    <i class="bi bi-lock-fill"></i> Confirm Password
                </label>
                <div style="position: relative;">
                    <input 
                        type="password" 
                        id="confirmNewPassword" 
                        class="form-input" 
                        placeholder="Type password again"
                        required
                        minlength="6"
                        style="padding-right: 40px;"
                    >
                    <i class="bi bi-eye-slash toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px;" onclick="togglePasswordVisibility('confirmNewPassword', this)"></i>
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="updateBtn">
                <span id="updateText">Update Password</span>
                <i class="bi bi-check-circle"></i>
            </button>
        </form>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="js/utils.js"></script>
    <script src="js/admin-config.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-reset-password.js"></script>
</body>
</html>
