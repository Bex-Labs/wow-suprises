<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Wow Surprises</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/wow-theme.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">LOGO</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="login-container">
            <div class="login-header">
                <h1>Create New Password</h1>
                <p>Please enter your new secure password below.</p>
            </div>

            <form class="login-form active" id="resetPasswordForm">
                
                <div class="form-group" style="position: relative;">
                    <label for="newPassword">
                        <i class="bi bi-lock"></i> New Password
                    </label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required style="padding-right: 40px;">
                    <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('newPassword', this)" style="position: absolute; right: 15px; top: 40px; cursor: pointer; color: #666; font-size: 1.2rem;"></i>
                </div>

                <div class="form-group" style="position: relative;">
                    <label for="confirmPassword">
                        <i class="bi bi-lock-fill"></i> Confirm Password
                    </label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required style="padding-right: 40px;">
                    <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)" style="position: absolute; right: 15px; top: 40px; cursor: pointer; color: #666; font-size: 1.2rem;"></i>
                </div>

                <button type="submit" class="btn-primary btn-full">
                    <i class="bi bi-check-circle"></i> Update Password
                </button>
                
                <div class="text-center mt-20">
                    <a href="login.html" class="link">Back to Login</a>
                </div>
            </form>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabaseApi.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
