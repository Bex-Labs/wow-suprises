<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WOW Surprises</title>
    <link rel="icon" type="image/png" href="images/wowlogo-nobg.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/wow-theme.css">
    
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="WOW Surprises" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'font-size:24px; font-weight:800; color:#000;\'>WOW SURPRISES</span>';">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container" style="margin-top: 100px; margin-bottom: 100px;">
        <div class="auth-box">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2>Reset Password</h2>
                <p style="color: #666; margin-top: 10px;">Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form id="forgotPasswordForm" class="active">
                <div class="input-group">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="Email Address" required>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">
                    <i class="bi bi-send"></i> Send Reset Link
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px;">
                <a href="login.html" style="color: #3b82f6; text-decoration: none; font-weight: 500;">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/forgot-password.js"></script>
</body>
</html>
