<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wow Surprises</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/loginstyles.css">
    <link rel="stylesheet" href="css/login.css">
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">LOGO</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="booking-history.html">My Bookings</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="login-container">
            <div class="login-header">
                <h1>Welcome Back!</h1>
                <p>Login to manage your surprises</p>
            </div>

            <!-- Tabs -->
            <div class="form-tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('register')">Register</div>
            </div>

            <!-- Login Form -->
            <form class="login-form active" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">
                        <i class="bi bi-envelope"></i> Email
                    </label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary btn-full">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
                <div class="text-center mt-20">
                    <a href="#" class="link">Forgot Password?</a>
                </div>
            </form>

            <!-- Register Form -->
            <form class="register-form" id="registerForm">
                <div class="form-group">
                    <label for="registerName">
                        <i class="bi bi-person"></i> Full Name
                    </label>
                    <input type="text" id="registerName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">
                        <i class="bi bi-envelope"></i> Email
                    </label>
                    <input type="email" id="registerEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="registerPhone">
                        <i class="bi bi-telephone"></i> Phone Number
                    </label>
                    <input type="tel" id="registerPhone" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <input type="password" id="registerPassword" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">
                        <i class="bi bi-lock-fill"></i> Confirm Password
                    </label>
                    <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="agreeTerms" required>
                        <span>I agree to the <a href="#" class="link">Terms & Conditions</a></span>
                    </label>
                </div>
                <button type="submit" class="btn-primary btn-full">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>

            <!-- Social Login -->
            <div class="social-login">
                <div class="divider">
                    <span>Or continue with</span>
                </div>
                <div class="social-btns">
                    <button type="button" class="social-btn" onclick="socialLogin('google')">
                        <i class="bi bi-google"></i> Google
                    </button>
                    <button type="button" class="social-btn" onclick="socialLogin('facebook')">
                        <i class="bi bi-facebook"></i> Facebook
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- CRITICAL FIX: Load config.js FIRST! -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/supabaseApi.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
